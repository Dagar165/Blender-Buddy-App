name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      # Vite собирает, не проверяя типы: ошибка вроде опечатки в имени поля
      # молча доезжала до ученика и падала уже в браузере. Проверяем до сборки —
      # тогда сломанный код просто не выкладывается, а на сайте остаётся
      # предыдущая рабочая версия.
      - name: Check types
        id: typecheck
        continue-on-error: true
        run: npx tsc --noEmit 2>&1 | tee typecheck.txt

      - name: Build site
        run: npx vite build

      # Отчёт кладётся рядом с сайтом: логи сборки закрыты, а так ошибки
      # видно по адресу /typecheck.txt. Временно, снять после разбора.
      - name: Publish typecheck report
        run: cp typecheck.txt dist/public/typecheck.txt || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
